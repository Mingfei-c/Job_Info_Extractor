[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B"]

ignore = [
    "E501",  # Line too long (already handled by formatter)
    "B008",  # Function call in default argument (standard FastAPI pattern: File(...), Depends(...))
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.basedpyright]
include = ["."]
exclude = [
    "**/node_modules",
    "**/__pycache__",
    ".venv",
    ".git"
]

typeCheckingMode = "basic"

# Ignore missing imports (dependencies not installed in CI)
reportMissingImports = false
reportMissingModuleSource = false
reportMissingTypeStubs = false

# Relax some strict checks
reportUnknownMemberType = false
reportUnknownArgumentType = false
reportUnknownVariableType = false
reportArgumentType = "warning"
reportAttributeAccessIssue = "warning"
# SQLAlchemy ORM columns are correctly used as plain values at runtime;
# basedpyright incorrectly types them as Column[T] in boolean checks.
reportGeneralTypeIssues = "warning"
# langchain-google-genai type stubs are incomplete (e.g. google_api_key param)
reportCallIssue = "warning"


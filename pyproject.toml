[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B"]

ignore = ["E501"] # Line too long (already handled by formatter)

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.basedpyright]
include = ["."]
exclude = [
    "**/node_modules",
    "**/__pycache__",
    ".venv",
    ".git"
]

typeCheckingMode = "basic"

reportMissingTypeStubs = false
reportUnknownMemberType = false
